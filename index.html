<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POSTECH PSI 시험 결과</title>
  <style>
    :root {
      --bg: #fbfbfc;
      --surface: #ffffff;
      --surface-strong: #f3f5f7;
      --text: #151b23;
      --muted: #66707b;
      --accent: #0b57d0;
      --accent-soft: #eaf2ff;
      --border: #d9dee3;
      --border-strong: #c7cdd4;
    }

    body[data-theme="dark"] {
      --bg: #0d1117;
      --surface: #0f141b;
      --surface-strong: #161b22;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: rgba(56, 139, 253, 0.15);
      --border: #30363d;
      --border-strong: #3d444d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      transition: background 180ms ease, color 180ms ease;
    }

    .shell {
      width: min(820px, calc(100% - 28px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      padding: 0 0 24px;
      border-bottom: 1px solid var(--border);
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      background: transparent;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .theme-toggle {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-strong);
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .theme-toggle:hover {
      background: var(--accent-soft);
    }

    h1 {
      margin: 0 0 10px;
      max-width: 760px;
      font-size: clamp(2.25rem, 5vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 180px));
      gap: 12px;
      margin-top: 28px;
    }

    .meta-card {
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface-strong);
    }

    .meta-label {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .meta-value {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .section {
      margin-top: 28px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .section-header {
      margin-bottom: 14px;
    }

    .section-header h2 {
      margin: 0 0 5px;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
    }

    .section-header p {
      margin: 0;
      color: var(--muted);
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface);
    }

    .test-grid {
      display: grid;
      gap: 14px;
    }

    .test-card {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }

    .test-card h3 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .test-card .date {
      margin: 0;
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .test-card .summary {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .metric-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 0 0 16px;
    }

    .metric-item {
      display: grid;
      gap: 2px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      font-size: 0.875rem;
    }

    .metric-item span:first-child {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-strong);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
    }

    .button.secondary {
      background: transparent;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: var(--surface-strong);
      color: var(--muted);
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 820px);
        padding-top: 24px;
      }

      .hero-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .meta {
        grid-template-columns: 1fr;
      }

      .card-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-top">
        <div class="eyebrow">POSTECH PSI</div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">다크 모드</button>
      </div>
      <h1>POSTECH PSI 시험 결과</h1>
      <p>PSI 연소 시험 결과를 정리해 공개하는 페이지입니다.</p>

      <div class="meta" id="meta-summary">
        <div class="meta-card">
          <div class="meta-label">공개된 시험</div>
          <div class="meta-value" id="published-count">-</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">최신 시험</div>
          <div class="meta-value" id="latest-test">-</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>공개된 시험</h2>
      </div>
      <div class="panel">
        <div class="test-grid" id="test-grid">
          <div class="empty">시험 목록을 불러오는 중입니다.</div>
        </div>
        <div class="footer-note">
          작업 방식은 <a href="./guide.md">저장소 구조 가이드</a> 와 <a href="./test-entry-notes.md">시험 항목 메모</a> 에 정리되어 있습니다.
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>저장소 정보</h2>
        <p>결과 페이지와 메타데이터를 분리해 두어 시험 수가 늘어나도 구조를 단순하게 유지할 수 있습니다.</p>
      </div>
      <div class="panel">
        <div class="link-list">
          <a class="button" href="./README.md">README</a>
          <a class="button secondary" href="./guide.md">가이드</a>
          <a class="button secondary" href="./test-entry-notes.md">메모</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const THEME_STORAGE_KEY = "psi-test-results-theme";

    function setTheme(theme) {
      document.body.dataset.theme = theme;
      const toggle = document.getElementById("theme-toggle");
      if (toggle) {
        toggle.textContent = theme === "dark" ? "라이트 모드" : "다크 모드";
      }
    }

    function initializeTheme() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const theme = savedTheme || (systemPrefersDark ? "dark" : "light");
      setTheme(theme);
    }

    async function loadTests() {
      const response = await fetch("./tests/index.json", { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Failed to load test catalog");
      }

      return response.json();
    }

    function renderMetric(label, value) {
      return `<div class="metric-item"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function renderCard(test) {
      const metrics = [
        ["점화 지연", test.metrics.ignitionDelayMs],
        ["연소 시간", test.metrics.burnTimeMs],
        ["최대 추력", test.metrics.maxThrustN],
        ["총 임펄스", test.metrics.totalImpulseNs]
      ].map(([label, value]) => renderMetric(label, value)).join("");

      return `
        <article class="test-card">
          <div class="card-head">
            <h3>${test.title}</h3>
            <p class="date">${test.date}</p>
          </div>
          <p class="summary">${test.summary}</p>
          <div class="metric-list">${metrics}</div>
          <div class="actions">
            <a class="button" href="${test.links.page}">보고서 열기</a>
            <a class="button secondary" href="${test.links.markdown}">마크다운 보기</a>
          </div>
        </article>
      `;
    }

    function renderTests(catalog) {
      const tests = Array.isArray(catalog.tests) ? catalog.tests : [];
      const grid = document.getElementById("test-grid");
      const latest = tests[0];

      document.getElementById("published-count").textContent = String(tests.length);
      document.getElementById("latest-test").textContent = latest ? latest.date : "-";

      if (!tests.length) {
        grid.innerHTML = '<div class="empty">아직 공개된 시험 결과가 없습니다.</div>';
        return;
      }

      grid.innerHTML = tests.map(renderCard).join("");
    }

    document.getElementById("theme-toggle").addEventListener("click", () => {
      const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
      setTheme(nextTheme);
    });

    initializeTheme();

    loadTests()
      .then(renderTests)
      .catch(() => {
        const grid = document.getElementById("test-grid");
        grid.innerHTML = '<div class="empty">시험 목록을 불러오지 못했습니다. 저장소 안내는 <a href="./README.md">README</a> 를 확인해 주세요.</div>';
      });
  </script>
</body>
</html>
