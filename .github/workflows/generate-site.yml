name: Generate test site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate pages
        shell: pwsh
        run: .\scripts\generate_test_site.ps1

      - name: Commit generated files
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md index.md data/tests.json tests
          git commit -m "Auto-generate test site"
          git push
